services:
  db:
    image: postgres:16
    container_name: url-shortener-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - url-network

  app:
    build: .
    container_name: url-shortener-app
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: url_shortener
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - url-network

volumes:
  postgres_data:

networks:
  url-network:
    name: url-shortener-network
    driver: bridge